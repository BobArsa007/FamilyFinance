<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Keuangan Keluarga</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #050505; }
        /* ... (your original styles remain unchanged - I only added a few small ones below) */
        .action-btn { transition: all 0.2s; }
        .action-btn:hover { transform: scale(1.15); }
        #edit-modal {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.75);
            backdrop-filter: blur(4px);
            z-index: 500;
            display: flex; align-items: center; justify-content: center;
            opacity: 0; pointer-events: none;
            transition: opacity 0.3s ease;
            padding: 16px;
        }
        #edit-modal.open { opacity: 1; pointer-events: all; }
        #edit-modal-box {
            background: #111113;
            border: 1px solid #27272a;
            border-radius: 24px;
            padding: 28px;
            width: 100%;
            max-width: 460px;
            transform: translateY(20px) scale(0.97);
            transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        #edit-modal.open #edit-modal-box { transform: translateY(0) scale(1); }
    </style>
</head>
<body class="text-slate-200 antialiased p-3 sm:p-6 md:p-8">
    <!-- Loading, Toast, Transfer Modal (unchanged) -->
    <!-- ... your original loading overlay, toast, transfer modal stay exactly the same ... -->

    <!-- NEW: Edit Transaction Modal -->
    <div id="edit-modal">
        <div id="edit-modal-box">
            <div class="flex items-center justify-between mb-6">
                <h3 id="edit-modal-title" class="text-lg font-semibold text-white">Edit Transaksi</h3>
                <button onclick="closeEditModal()" class="text-zinc-500 hover:text-white transition-colors p-1">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                    </svg>
                </button>
            </div>
            <div class="space-y-4">
                <div>
                    <label class="text-xs text-zinc-400 mb-1.5 block">Tanggal</label>
                    <input type="date" id="edit-date" class="w-full rounded-2xl border px-4 py-3 text-sm">
                </div>
                <div>
                    <label class="text-xs text-zinc-400 mb-1.5 block">Deskripsi</label>
                    <input type="text" id="edit-desc" class="w-full rounded-2xl border px-4 py-3 text-sm">
                </div>
                <div>
                    <label class="text-xs text-zinc-400 mb-1.5 block">Tipe</label>
                    <select id="edit-type" class="w-full rounded-2xl border px-4 py-3 text-sm">
                        <option value="pemasukan">Pemasukan</option>
                        <option value="pengeluaran">Pengeluaran</option>
                    </select>
                </div>
                <div>
                    <label class="text-xs text-zinc-400 mb-1.5 block">Nominal (Rp)</label>
                    <input type="number" id="edit-amount" class="w-full rounded-2xl border px-4 py-3 text-sm">
                </div>
            </div>
            <div class="flex gap-3 mt-6">
                <button onclick="closeEditModal()" class="flex-1 px-4 py-3 rounded-2xl border border-zinc-700 text-zinc-400 hover:text-white hover:border-zinc-500 transition-all text-sm font-medium">
                    Batal
                </button>
                <button onclick="saveEdit()" class="flex-1 px-4 py-3 rounded-2xl bg-blue-600 hover:bg-blue-500 text-white text-sm font-semibold transition-all">
                    Simpan Perubahan
                </button>
            </div>
        </div>
    </div>

    <!-- Rest of your HTML (header, wallets, transfer bridge, ledger panel) is unchanged except the tables -->
    <!-- ... your original content until the tables ... -->

    <script>
        // =============================================
        // JSONBIN CONFIG (still here - security note at the bottom)
        // =============================================
        const JSONBIN_BIN_ID = '69dfd38a36566621a8b8e7e5';
        const JSONBIN_API_KEY = '$2a$10$aOMy.0xdjfpp1ly5ZZWtCuD65YDOf8msitXmJj2FDeS5XT1AQcN1y';
        const JSONBIN_URL = `https://api.jsonbin.io/v3/b/${JSONBIN_BIN_ID}`;

        // ... your original initialDataMama, initialDataPakde, variables (dataMama, dataPakde, dataLoans, etc.) stay the same ...

        // NEW: Date parser (handles both old Indonesian text and YYYY-MM-DD)
        const monthMap = {
            "Januari": "01", "Februari": "02", "Maret": "03", "April": "04", "Mei": "05", "Juni": "06",
            "Juli": "07", "Agustus": "08", "September": "09", "Oktober": "10", "November": "11", "Desember": "12"
        };

        function parseDate(dateStr) {
            if (/^\d{4}-\d{2}-\d{2}$/.test(dateStr)) return dateStr;
            const match = dateStr.match(/(\d{1,2})\s+([A-Za-z]+)\s+(\d{4})/);
            if (match) {
                const day = match[1].padStart(2, '0');
                const monthName = match[2];
                const year = match[3];
                const month = monthMap[monthName] || monthMap[monthName.charAt(0).toUpperCase() + monthName.slice(1)];
                if (month) return `${year}-${month}-${day}`;
            }
            return '9999-12-31';
        }

        // NEW: Recalculate all balances after edit/delete
        function recalculateBalances(person) {
            let arr = person === 'mama' ? dataMama : dataPakde;
            if (arr.length === 0) return;

            // Sort oldest → newest
            const sorted = [...arr].sort((a, b) => parseDate(a.Tanggal).localeCompare(parseDate(b.Tanggal)));

            // Keep the oldest transaction's current saldo as base, then recompute forward
            let running = sorted[0].Saldo;
            sorted[0].Saldo = running;

            for (let i = 1; i < sorted.length; i++) {
                const pm = sorted[i].Pemasukan || 0;
                const pk = sorted[i].Pengeluaran || 0;
                running += pm - pk;
                sorted[i].Saldo = Math.round(running * 100) / 100; // avoid floating point issues
            }

            // Put back in newest-first order
            if (person === 'mama') dataMama = sorted.reverse();
            else dataPakde = sorted.reverse();
        }

        // UPDATED: renderLedger now takes person instead of data + element
        const renderLedger = (person) => {
            const data = person === 'mama' ? dataMama : dataPakde;
            const tbody = document.getElementById(`body-${person}`);
            let html = '';

            data.forEach((row, i) => {
                if (!row.Deskripsi && row.Saldo === 0) return;
                const signed = row.Pemasukan > 0
                    ? `<span class="text-emerald-400 font-medium">+${formatRp(row.Pemasukan)}</span>`
                    : `<span class="text-red-400 font-medium">-${formatRp(row.Pengeluaran)}</span>`;

                const isTransfer = row.Deskripsi && (row.Deskripsi.startsWith('🤝') || row.Deskripsi.startsWith('✅'));

                html += `<tr class="${isTransfer ? 'bg-amber-950/20 hover:bg-amber-950/30' : 'hover:bg-zinc-800/70'} transition-colors">
                    <td class="px-4 sm:px-8 py-3 sm:py-5 text-zinc-400 text-xs sm:text-sm whitespace-nowrap">${row.Tanggal}</td>
                    <td class="px-4 sm:px-8 py-3 sm:py-5 text-white text-xs sm:text-sm">
                        <span class="font-medium">${row.Deskripsi}</span>
                        <span class="sm:hidden text-xs mt-0.5 block">${signed}</span>
                    </td>
                    <td class="px-4 sm:px-8 py-3 sm:py-5 text-right text-emerald-400 font-medium text-sm hidden sm:table-cell">${formatRp(row.Pemasukan)}</td>
                    <td class="px-4 sm:px-8 py-3 sm:py-5 text-right text-red-400 font-medium text-sm hidden sm:table-cell">${formatRp(row.Pengeluaran)}</td>
                    <td class="px-4 sm:px-8 py-3 sm:py-5 text-right font-semibold text-white text-xs sm:text-sm whitespace-nowrap">${formatRp(row.Saldo)}</td>
                    <td class="px-4 sm:px-8 py-3 sm:py-5 text-right">
                        <div class="flex justify-end gap-3">
                            <button onclick="editTransaction('${person}', ${i})" class="action-btn text-blue-400 hover:text-blue-500 text-xl">✏️</button>
                            <button onclick="deleteTransaction('${person}', ${i})" class="action-btn text-red-400 hover:text-red-500 text-xl">🗑️</button>
                        </div>
                    </td>
                </tr>`;
            });

            tbody.innerHTML = html || '<tr><td colspan="6" class="text-center py-10 text-zinc-500">Belum ada transaksi</td></tr>';
        };

        // NEW: Edit functions
        let currentEditPerson = null;
        let currentEditIndex = null;

        window.editTransaction = function(person, index) {
            currentEditPerson = person;
            currentEditIndex = index;

            const dataArr = person === 'mama' ? dataMama : dataPakde;
            const trans = dataArr[index];

            // Fill modal
            const isoDate = parseDate(trans.Tanggal);
            document.getElementById('edit-date').value = (isoDate !== '9999-12-31') ? isoDate : '';
            document.getElementById('edit-desc').value = trans.Deskripsi || '';
            
            const isIncome = trans.Pemasukan > 0;
            document.getElementById('edit-type').value = isIncome ? 'pemasukan' : 'pengeluaran';
            document.getElementById('edit-amount').value = isIncome ? trans.Pemasukan : trans.Pengeluaran;

            document.getElementById('edit-modal').classList.add('open');
        };

        window.saveEdit = async function() {
            if (currentEditPerson === null || currentEditIndex === null) return;

            const dateVal = document.getElementById('edit-date').value;
            const descVal = document.getElementById('edit-desc').value.trim();
            const typeVal = document.getElementById('edit-type').value;
            const amountVal = parseFloat(document.getElementById('edit-amount').value);

            if (!dateVal || isNaN(amountVal) || amountVal <= 0) {
                alert('Mohon lengkapi tanggal dan nominal dengan benar!');
                return;
            }

            const dataArr = currentEditPerson === 'mama' ? dataMama : dataPakde;
            const trans = dataArr[currentEditIndex];

            trans.Tanggal = dateVal; // store as clean YYYY-MM-DD
            trans.Deskripsi = descVal || 'Transaksi diedit';

            if (typeVal === 'pemasukan') {
                trans.Pemasukan = amountVal;
                trans.Pengeluaran = 0;
            } else {
                trans.Pemasukan = 0;
                trans.Pengeluaran = amountVal;
            }

            recalculateBalances(currentEditPerson);
            closeEditModal();

            renderLedger('mama');
            renderLedger('pakde');
            updateSummary();

            await saveToCloud();
            showToast('✅ Transaksi berhasil diupdate!');
        };

        window.closeEditModal = function() {
            document.getElementById('edit-modal').classList.remove('open');
            currentEditPerson = null;
            currentEditIndex = null;
        };

        // NEW: Delete function
        window.deleteTransaction = async function(person, index) {
            if (!confirm('Hapus transaksi ini secara permanen?\nSaldo semua transaksi setelahnya akan dihitung ulang.')) return;

            const dataArr = person === 'mama' ? dataMama : dataPakde;
            dataArr.splice(index, 1);

            recalculateBalances(person);

            renderLedger('mama');
            renderLedger('pakde');
            updateSummary();

            await saveToCloud();
            showToast('🗑️ Transaksi berhasil dihapus!');
        };

        // Update all calls that use renderLedger (add, transfer, reset, init)
        // Example (you'll see them updated in the full script):
        // renderLedger('mama');
        // renderLedger('pakde');

        // ... rest of your original script stays the same, only the functions above were replaced/added ...

        // (The rest of your script - loadFromCloud, saveToCloud, updateSummary, confirmTransfer, addTransaction, etc. - remains unchanged except the renderLedger calls are now renderLedger('mama') instead of renderLedger(dataMama, 'body-mama'))

        async function init() {
            const overlay = document.getElementById('loading-overlay');
            await loadFromCloud();
            renderLedger('mama');
            renderLedger('pakde');
            renderLoanHistory();
            updateSummary();
            // ... rest of init unchanged ...
            overlay.classList.add('hidden');
        }

        init();
    </script>
</body>
</html>
