    <style>
        body { font-family: 'Inter', sans-serif; background-color: #050505; }
        input, select { outline: none; background-color: #111113; border-color: #27272a; }
        input:focus, select:focus { border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2); }
        table thead { background-color: #111113; }
        .header-title { font-size: clamp(1.5rem, 6vw, 2.75rem); line-height: 1.05; letter-spacing: -1.5px; }
        .header-subtitle { font-size: clamp(0.875rem, 3.5vw, 1.5rem); }
        .total-kas-badge { display: flex; flex-direction: column; gap: 2px; background: rgba(24,24,27,0.97); padding: 10px 16px; border-radius: 999px; border: 1px solid rgba(139, 92, 246, 0.25); }
        @media (min-width: 480px) { .total-kas-badge { flex-direction: row; align-items: center; gap: 12px; padding: 14px 24px; } }
        .total-kas-amount { font-size: clamp(1.25rem, 5vw, 2.25rem); font-weight: 600; color: #a78bfa; letter-spacing: -1px; line-height: 1; white-space: nowrap; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        .wallet-section { animation: fadeInUp 0.8s ease forwards; }
        .wallet-card { transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); position: relative; }
        .wallet-card:hover { transform: scale(1.02); box-shadow: 0 35px 60px -15px rgb(0 0 0 / 0.5); }
        .wallet-container { perspective: 1400px; filter: drop-shadow(0 20px 20px rgb(0 0 0 / 0.3)); }
        .wallet-svg { transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1); width: clamp(100px, 28vw, 180px); height: auto; }
        .wallet-card:hover .wallet-svg { transform: scale(1.08) rotate(3deg); }
        .flap { transition: transform 0.9s cubic-bezier(0.34, 1.56, 0.64, 1); transform-origin: 50% 22%; }
        .wallet-card.opened .flap { transform: rotateX(-82deg); }
        .wallet-card.opened .wallet-svg { animation: walletPop 0.6s ease; }
        @keyframes walletPop { 0% { transform: scale(1); } 50% { transform: scale(1.12); } 100% { transform: scale(1); } }
        .wallet-saldo { font-size: clamp(1.5rem, 7vw, 3.75rem); font-weight: 700; letter-spacing: -1.5px; line-height: 1; }
        .wallet-name { font-size: clamp(1rem, 4vw, 1.875rem); font-weight: 700; }
        .tab-btn { font-size: clamp(0.7rem, 2.8vw, 1rem); padding: clamp(8px, 2vw, 16px) clamp(10px, 3vw, 32px); }
        table thead { position: sticky; top: 0; z-index: 10; }
        #ledger-panel { overflow: hidden; max-height: 0; opacity: 0; transition: max-height 0.7s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.5s ease; }
        #ledger-panel.open { max-height: 2000px; opacity: 1; }
        .wallet-card.active-mama { border-color: #60a5fa !important; box-shadow: 0 0 0 3px rgba(59,130,246,0.18), 0 35px 60px -15px rgb(0 0 0 / 0.5); }
        .wallet-card.active-pakde { border-color: #34d399 !important; box-shadow: 0 0 0 3px rgba(52,211,153,0.18), 0 35px 60px -15px rgb(0 0 0 / 0.5); }
        #loading-overlay { position: fixed; inset: 0; background: #050505; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 999; transition: opacity 0.5s ease; }
        #loading-overlay.hidden { opacity: 0; pointer-events: none; }
        .spinner { width: 40px; height: 40px; border: 3px solid #27272a; border-top-color: #a78bfa; border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        #toast { position: fixed; bottom: 24px; right: 24px; background: #18181b; border: 1px solid #27272a; color: #d4d4d8; padding: 12px 20px; border-radius: 12px; font-size: 0.875rem; z-index: 9999; transform: translateY(80px); opacity: 0; transition: all 0.35s cubic-bezier(0.34, 1.56, 0.64, 1); }
        #toast.show { transform: translateY(0); opacity: 1; }
        .action-btn { transition: all 0.2s; }
        .action-btn:hover { transform: scale(1.15); }
        #edit-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.75); backdrop-filter: blur(4px); z-index: 500; display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.3s ease; padding: 16px; }

        #edit-modal.open #edit-modal-box { transform: translateY(0) scale(1); }
    </style>
</head>

        function parseDate(dateStr) {
            if (/^\d{4}-\d{2}-\d{2}$/.test(dateStr)) return dateStr;
            const match = dateStr.match(/(\d{1,2})\s+([A-Za-z]+)\s+(\d{4})/);
            if (match) {
                const day = match[1].padStart(2,'0');
                const month = monthMap[match[2]] || "12";
                return `${match[3]}-${month}-${day}`;
            }
            return '9999-12-31';
        }

        // Recalculate balances after edit/delete
        function recalculateBalances(person) {
            let arr = person === 'mama' ? dataMama : dataPakde;
            if (arr.length === 0) return;
            const sorted = [...arr].sort((a,b) => parseDate(a.Tanggal).localeCompare(parseDate(b.Tanggal)));
            let running = sorted[0].Saldo;
            sorted[0].Saldo = running;
            for (let i = 1; i < sorted.length; i++) {
                running += (sorted[i].Pemasukan || 0) - (sorted[i].Pengeluaran || 0);
                sorted[i].Saldo = Math.round(running * 100) / 100;
            }
            if (person === 'mama') dataMama = sorted.reverse();
            else dataPakde = sorted.reverse();
        }

            document.getElementById('edit-amount').value = trans.Pemasukan > 0 ? trans.Pemasukan : trans.Pengeluaran;
            document.getElementById('edit-modal').classList.add('open');
        };

        window.saveEdit = async function() {
            if (currentEditPerson === null) return;
            const dateVal = document.getElementById('edit-date').value;
            const descVal = document.getElementById('edit-desc').value.trim();
            const typeVal = document.getElementById('edit-type').value;
            const amountVal = parseFloat(document.getElementById('edit-amount').value);

            if (!dateVal || isNaN(amountVal) || amountVal <= 0) {

                return;
            }

            const arr = currentEditPerson === 'mama' ? dataMama : dataPakde;

            trans.Tanggal = dateVal;
            trans.Deskripsi = descVal || 'Transaksi diedit';
            if (typeVal === 'pemasukan') {

            } else {
                trans.Pemasukan = 0; trans.Pengeluaran = amountVal;
            }

            recalculateBalances(currentEditPerson);
            closeEditModal();
            renderLedger('mama');
            renderLedger('pakde');
            updateSummary();
            await saveToCloud();

        };

        window.closeEditModal = function() {
            document.getElementById('edit-modal').classList.remove('open');

        };

        window.deleteTransaction = async function(person, index) {
            if (!confirm('Hapus transaksi ini permanen?')) return;
            const arr = person === 'mama' ? dataMama : dataPakde;
            arr.splice(index, 1);
            recalculateBalances(person);
            renderLedger('mama');
            renderLedger('pakde');
            updateSummary();
            await saveToCloud();
            showToast('🗑️ Transaksi dihapus!');

                if (el) el.valueAsDate = today;

            overlay.classList.add('hidden');
