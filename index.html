<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Keuangan Keluarga</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        input, select { outline: none; }
        input:focus, select:focus { border-color: #3b82f6; }
    </style>
</head>
<body class="text-slate-800 antialiased p-4 md:p-8">
    <div class="max-w-6xl mx-auto">
        <header class="mb-8 flex flex-col md:flex-row md:items-end justify-between gap-4">
            <div>
                <h1 class="text-3xl font-bold text-slate-900 tracking-tight">Manajemen Finansial</h1>
                <p class="text-slate-500 mt-1">Ringkasan arus kas keluarga (Mama & Pakde).</p>
            </div>
            <div class="flex gap-2">
                <button onclick="resetData()" 
                        class="px-4 py-2 text-sm font-medium text-red-600 hover:bg-red-50 rounded-xl border border-red-200 flex items-center gap-1">
                    <span>Reset Data Awal</span>
                </button>
            </div>
        </header>

        <!-- Summary Cards -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
            <div class="bg-white rounded-2xl p-6 shadow-sm border border-slate-100 flex flex-col justify-center relative overflow-hidden">
                <div class="absolute top-0 right-0 p-4 opacity-10">
                    <svg class="w-16 h-16 text-blue-600" fill="currentColor" viewBox="0 0 20 20"><path d="M4 4a2 2 0 00-2 2v1h16V6a2 2 0 00-2-2H4z"/><path fill-rule="evenodd" d="M18 9H2v5a2 2 0 002 2h12a2 2 0 002-2V9zM4 13a1 1 0 011-1h1a1 1 0 110 2H5a1 1 0 01-1-1zm5-1a1 1 0 100 2h1a1 1 0 100-2H9z" clip-rule="evenodd"/></svg>
                </div>
                <h3 class="text-sm font-semibold text-slate-500 uppercase tracking-wider">Sisa Saldo Mama</h3>
                <p class="text-3xl font-bold text-blue-600 mt-2" id="saldo-mama-text">Rp 0</p>
            </div>
            <div class="bg-white rounded-2xl p-6 shadow-sm border border-slate-100 flex flex-col justify-center relative overflow-hidden">
                <div class="absolute top-0 right-0 p-4 opacity-10">
                    <svg class="w-16 h-16 text-emerald-600" fill="currentColor" viewBox="0 0 20 20"><path d="M4 4a2 2 0 00-2 2v1h16V6a2 2 0 00-2-2H4z"/><path fill-rule="evenodd" d="M18 9H2v5a2 2 0 002 2h12a2 2 0 002-2V9zM4 13a1 1 0 011-1h1a1 1 0 110 2H5a1 1 0 01-1-1zm5-1a1 1 0 100 2h1a1 1 0 100-2H9z" clip-rule="evenodd"/></svg>
                </div>
                <h3 class="text-sm font-semibold text-slate-500 uppercase tracking-wider">Sisa Saldo Pakde</h3>
                <p class="text-3xl font-bold text-emerald-600 mt-2" id="saldo-pakde-text">Rp 0</p>
            </div>
        </div>

        <!-- Tabs -->
        <div class="flex space-x-1 bg-slate-200/50 p-1 rounded-xl mb-6 overflow-x-auto scrollbar-hide">
            <button class="tab-btn active flex-1 py-2.5 px-4 rounded-lg text-sm font-medium transition-all bg-white text-slate-800 shadow shadow-slate-200" onclick="switchTab(event, 'tab-mama')">
                Buku Kas Mama
            </button>
            <button class="tab-btn flex-1 py-2.5 px-4 rounded-lg text-sm font-medium transition-all text-slate-500 hover:text-slate-700 hover:bg-white/50" onclick="switchTab(event, 'tab-pakde')">
                Buku Kas Pakde
            </button>
        </div>

        <!-- Tab Mama -->
        <div id="tab-mama" class="tab-content active">
            <div class="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden p-6 mb-4">
                <h3 class="text-sm font-bold text-slate-800 mb-4">Tambah Transaksi Baru</h3>
                <div class="flex flex-col md:flex-row gap-4 items-end">
                    <div class="flex-1"><label class="text-xs text-slate-500 mb-1 block">Tanggal</label><input type="date" id="mama-date" class="w-full rounded-md border-slate-300 shadow-sm text-sm px-3 py-2 border bg-slate-50"></div>
                    <div class="flex-[2]"><label class="text-xs text-slate-500 mb-1 block">Deskripsi</label><input type="text" id="mama-desc" placeholder="Contoh: Belanja Bulanan" class="w-full rounded-md border-slate-300 shadow-sm text-sm px-3 py-2 border bg-slate-50"></div>
                    <div class="flex-1"><label class="text-xs text-slate-500 mb-1 block">Tipe</label><select id="mama-type" class="w-full rounded-md border-slate-300 shadow-sm text-sm px-3 py-2 border bg-slate-50"><option value="pengeluaran">Pengeluaran</option><option value="pemasukan">Pemasukan</option></select></div>
                    <div class="flex-1"><label class="text-xs text-slate-500 mb-1 block">Nominal (Rp)</label><input type="number" id="mama-amount" placeholder="50000" class="w-full rounded-md border-slate-300 shadow-sm text-sm px-3 py-2 border bg-slate-50"></div>
                    <div><button onclick="addTransaction('mama')" class="w-full bg-blue-600 text-white px-6 py-2 rounded-md hover:bg-blue-700 transition-colors text-sm font-bold shadow-sm">Simpan</button></div>
                </div>
            </div>
            <div class="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden">
                <div class="overflow-x-auto max-h-[600px] overflow-y-auto">
                    <table class="w-full text-left text-sm whitespace-nowrap">
                        <thead class="bg-slate-50/90 text-slate-500 border-b border-slate-100 sticky top-0 backdrop-blur">
                            <tr>
                                <th class="px-6 py-4 font-semibold">Tanggal</th>
                                <th class="px-6 py-4 font-semibold">Deskripsi</th>
                                <th class="px-6 py-4 font-semibold text-right">Pemasukan</th>
                                <th class="px-6 py-4 font-semibold text-right">Pengeluaran</th>
                                <th class="px-6 py-4 font-semibold text-right">Saldo Akhir</th>
                            </tr>
                        </thead>
                        <tbody id="body-mama" class="divide-y divide-slate-100"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- Tab Pakde -->
        <div id="tab-pakde" class="tab-content">
            <!-- Sama seperti tab mama, hanya ganti ID dan warna button -->
            <div class="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden p-6 mb-4">
                <h3 class="text-sm font-bold text-slate-800 mb-4">Tambah Transaksi Baru</h3>
                <div class="flex flex-col md:flex-row gap-4 items-end">
                    <div class="flex-1"><label class="text-xs text-slate-500 mb-1 block">Tanggal</label><input type="date" id="pakde-date" class="w-full rounded-md border-slate-300 shadow-sm text-sm px-3 py-2 border bg-slate-50"></div>
                    <div class="flex-[2]"><label class="text-xs text-slate-500 mb-1 block">Deskripsi</label><input type="text" id="pakde-desc" placeholder="Contoh: Uang Bensin" class="w-full rounded-md border-slate-300 shadow-sm text-sm px-3 py-2 border bg-slate-50"></div>
                    <div class="flex-1"><label class="text-xs text-slate-500 mb-1 block">Tipe</label><select id="pakde-type" class="w-full rounded-md border-slate-300 shadow-sm text-sm px-3 py-2 border bg-slate-50"><option value="pengeluaran">Pengeluaran</option><option value="pemasukan">Pemasukan</option></select></div>
                    <div class="flex-1"><label class="text-xs text-slate-500 mb-1 block">Nominal (Rp)</label><input type="number" id="pakde-amount" placeholder="50000" class="w-full rounded-md border-slate-300 shadow-sm text-sm px-3 py-2 border bg-slate-50"></div>
                    <div><button onclick="addTransaction('pakde')" class="w-full bg-emerald-600 text-white px-6 py-2 rounded-md hover:bg-emerald-700 transition-colors text-sm font-bold shadow-sm">Simpan</button></div>
                </div>
            </div>
            <div class="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden">
                <div class="overflow-x-auto max-h-[600px] overflow-y-auto">
                    <table class="w-full text-left text-sm whitespace-nowrap">
                        <thead class="bg-slate-50/90 text-slate-500 border-b border-slate-100 sticky top-0 backdrop-blur">
                            <tr>
                                <th class="px-6 py-4 font-semibold">Tanggal</th>
                                <th class="px-6 py-4 font-semibold">Deskripsi</th>
                                <th class="px-6 py-4 font-semibold text-right">Pemasukan</th>
                                <th class="px-6 py-4 font-semibold text-right">Pengeluaran</th>
                                <th class="px-6 py-4 font-semibold text-right">Saldo Akhir</th>
                            </tr>
                        </thead>
                        <tbody id="body-pakde" class="divide-y divide-slate-100"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ================== DATA AWAL (hardcoded) ==================
        const initialDataMama = [/* seluruh array dataMama kamu yang lama, aku taruh di sini */];
        const initialDataPakde = [/* seluruh array dataPakde kamu yang lama, aku taruh di sini */];

        // Load dari localStorage atau pakai data awal
        let dataMama = JSON.parse(localStorage.getItem('dataMama')) || initialDataMama.reverse();
        let dataPakde = JSON.parse(localStorage.getItem('dataPakde')) || initialDataPakde.reverse();

        const formatRp = (num) => {
            if (num === null || isNaN(num)) return '-';
            return new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(num);
        };

        const updateSummary = () => {
            const saldoM = dataMama.length > 0 ? dataMama[0].Saldo : 0;
            const saldoP = dataPakde.length > 0 ? dataPakde[0].Saldo : 0;
            document.getElementById('saldo-mama-text').innerText = formatRp(saldoM);
            document.getElementById('saldo-pakde-text').innerText = formatRp(saldoP);
        };

        const renderLedger = (data, elementId) => {
            const tbody = document.getElementById(elementId);
            let html = '';
            data.forEach(row => {
                if (!row.Deskripsi && row.Saldo === 0) return;
                html += `
                    <tr class="hover:bg-slate-50/50 transition-colors">
                        <td class="px-6 py-4 text-slate-600">${row.Tanggal}</td>
                        <td class="px-6 py-4 font-medium text-slate-800">${row.Deskripsi}</td>
                        <td class="px-6 py-4 text-right text-emerald-600 font-medium">${formatRp(row.Pemasukan)}</td>
                        <td class="px-6 py-4 text-right text-rose-600 font-medium">${formatRp(row.Pengeluaran)}</td>
                        <td class="px-6 py-4 text-right font-bold text-slate-800">${formatRp(row.Saldo)}</td>
                    </tr>
                `;
            });
            tbody.innerHTML = html;
        };

        window.addTransaction = function(person) {
            const dateInput = document.getElementById(`${person}-date`).value;
            const descInput = document.getElementById(`${person}-desc`).value.trim();
            const typeInput = document.getElementById(`${person}-type`).value;
            const amountInput = parseFloat(document.getElementById(`${person}-amount`).value);

            if (!dateInput || !descInput || isNaN(amountInput) || amountInput <= 0) {
                alert("Mohon lengkapi semua data dengan benar!");
                return;
            }

            const dataArr = person === 'mama' ? dataMama : dataPakde;
            const currentSaldo = dataArr.length > 0 ? dataArr[0].Saldo : 0;

            const pmasuk = typeInput === 'pemasukan' ? amountInput : 0;
            const pkeluar = typeInput === 'pengeluaran' ? amountInput : 0;
            const newSaldo = currentSaldo + pmasuk - pkeluar;

            const newRecord = {
                Tanggal: dateInput,
                Deskripsi: descInput,
                Pemasukan: pmasuk,
                Pengeluaran: pkeluar,
                Saldo: newSaldo
            };

            dataArr.unshift(newRecord);

            // Simpan ke localStorage
            localStorage.setItem(person === 'mama' ? 'dataMama' : 'dataPakde', JSON.stringify(dataArr));

            renderLedger(dataArr, `body-${person}`);
            updateSummary();

            // Reset form
            document.getElementById(`${person}-desc`).value = '';
            document.getElementById(`${person}-amount`).value = '';
        };

        window.resetData = function() {
            if (confirm("Yakin reset semua data ke data awal? Transaksi yang sudah ditambahkan akan hilang.")) {
                localStorage.removeItem('dataMama');
                localStorage.removeItem('dataPakde');
                location.reload();
            }
        };

        // Render saat halaman dibuka
        document.getElementById('mama-date').valueAsDate = new Date();
        document.getElementById('pakde-date').valueAsDate = new Date();

        renderLedger(dataMama, 'body-mama');
        renderLedger(dataPakde, 'body-pakde');
        updateSummary();

        window.switchTab = function(evt, tabId) {
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('bg-white', 'text-slate-800', 'shadow', 'shadow-slate-200');
                btn.classList.add('text-slate-500', 'hover:text-slate-700', 'hover:bg-white/50');
            });
            document.getElementById(tabId).classList.add('active');
            evt.currentTarget.classList.add('bg-white', 'text-slate-800', 'shadow', 'shadow-slate-200');
        };
    </script>
</body>
</html>
